name: Daily Morning Intelligence Brief

on:
  schedule:
    # 7 AM EST (noon UTC) — runs every day
    # In EDT (summer) this fires at 8 AM — close enough for a morning brief
    - cron: '0 12 * * *'
  workflow_dispatch:
    # Allows you to trigger a run manually from the GitHub Actions tab

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required data directories
        run: |
          mkdir -p data/raw data/processed data/categories data/memory outputs/briefs

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/main.py
